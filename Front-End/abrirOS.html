<!DOCTYPE html>
<html class="light" lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir Ordem de Serviço - Projeto Integrador</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004d99",
                        "primary-container": "#1565c0",
                        "on-primary": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#424752",
                        "surface": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-high": "#e8e8e8",
                        "outline": "#727783"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body class="bg-surface-container-lowest flex items-center justify-center min-h-screen p-6">
    <main class="w-full max-w-[720px] animate-in fade-in zoom-in duration-700">
        <div class="mb-10 text-center">
            <h1 class="text-on-surface font-bold text-3xl">Abrir Ordem de Serviço</h1>
            <p class="text-on-surface-variant text-sm mt-2">Registre uma nova solicitação de manutenção</p>
        </div>

        <div class="bg-surface-container-low p-8 rounded-xl shadow-lg">
            <form class="space-y-6" method="POST" action="#">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase" for="setor">Setor Responsável</label>
                        <select id="setor" name="setor" required
                            class="w-full h-12 px-4 bg-surface-container-high rounded-lg border-none focus:ring-2 focus:ring-primary/20 appearance-none text-on-surface font-medium">
                            <option value="" disabled selected>Selecione o setor...</option>
                            <option>Costura</option>
                            <option>Montagem</option>
                            <option>Corte</option>
                            <option>Serigrafia</option>
                            <option>Administrativo</option>
                            <option>Outros</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase" for="equipamento">Identificação do Equipamento</label>
                        <input id="equipamento" name="equipamento" type="text" required
                            class="w-full h-12 px-4 bg-surface-container-high rounded-lg border-none focus:ring-2 focus:ring-primary/20 text-on-surface font-medium"
                            placeholder="Ex: Máquina de costura #12">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase">Criticidade</label>
                    <div class="grid grid-cols-3 gap-3 mt-2">
                        <label class="flex items-center justify-center h-12 rounded-xl border-2 border-surface-container-high cursor-pointer hover:bg-surface-container-low transition-all">
                            <input class="hidden peer" type="radio" name="criticidade" value="baixa" />
                            <span class="text-sm font-bold text-on-surface-variant peer-checked:text-primary">Baixa</span>
                        </label>
                        <label class="flex items-center justify-center h-12 rounded-xl border-2 border-surface-container-high cursor-pointer hover:bg-surface-container-low transition-all">
                            <input class="hidden peer" type="radio" name="criticidade" value="media" />
                            <span class="text-sm font-bold text-on-surface-variant peer-checked:text-primary">Média</span>
                        </label>
                        <label class="flex items-center justify-center h-12 rounded-xl border-2 border-primary cursor-pointer bg-primary-container/10 transition-all">
                            <input class="hidden peer" type="radio" name="criticidade" value="alta" checked />
                            <span class="text-sm font-bold text-primary">Alta</span>
                        </label>
                    </div>
                    <div class="flex items-start gap-3 p-4 bg-tertiary-container/10 rounded-xl border-l-4 border-tertiary-container mt-3">
                        <span class="material-symbols-outlined text-tertiary text-xl">warning</span>
                        <div class="text-sm text-tertiary font-medium leading-tight">
                            Equipamento crítico — prioridade urgente proposta automaticamente.
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase" for="servico">Natureza do Serviço</label>
                    <select id="servico" name="servico" required
                        class="w-full h-12 px-4 bg-surface-container-high rounded-lg border-none focus:ring-2 focus:ring-primary/20 appearance-none text-on-surface font-medium">
                        <option value="" disabled selected>Selecione o tipo...</option>
                        <option>Elétrico</option>
                        <option>Mecânico</option>
                        <option>Eletromecânico</option>
                        <option>Hidráulico</option>
                        <option>Predial</option>
                        <option>Outros</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase" for="descricao">Descrição Detalhada</label>
                    <textarea id="descricao" name="descricao" rows="4" required
                        class="w-full p-4 bg-surface-container-high rounded-lg border-none focus:ring-2 focus:ring-primary/20 placeholder:text-outline text-on-surface font-medium resize-none"
                        placeholder="Descreva o problema com detalhes..."></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase" for="prioridade">Prioridade Recomendada</label>
                    <select id="prioridade" name="prioridade" disabled
                        class="w-full h-12 px-4 bg-surface-container-high rounded-lg border-none text-on-surface font-bold bg-error-container/20 cursor-not-allowed">
                        <option>Urgente</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-4 top-3 text-on-surface-variant">lock</span>
                </div>

                <div class="pt-6 space-y-3">
                    <button type="submit" class="w-full h-14 bg-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary-container/20 hover:scale-[1.01] transition-transform active:scale-95 flex items-center justify-center gap-2">
                        Enviar Solicitação
                        <span class="material-symbols-outlined text-lg">send</span>
                    </button>
                    <button type="button" class="w-full h-12 text-on-surface-variant font-semibold hover:text-error transition-colors">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>
</body>

</html>
